<VirtualHost *:80>
    ServerName ci.nebbie.it

    AssignUserID nebbie nebbie

    # Default site; ci2 is selected at request time when the QA cookie is present.
    DocumentRoot /home/nebbie/ci/public/

    <Directory />
        Options FollowSymLinks
        AllowOverride None
    </Directory>

    <Directory /home/nebbie/ci/public>
        Require all granted
        AllowOverride All
        Options FollowSymLinks
    </Directory>

    <Directory /home/nebbie/ci2/public>
        Require all granted
        AllowOverride All
        Options FollowSymLinks
    </Directory>

    # Cookie QA present -> serve from /home/nebbie/ci2/public
    SetEnvIf Cookie "(^|;\s*)QA=" USE_CI2=1

    RewriteEngine On

    RewriteCond %{ENV:USE_CI2} =1
    RewriteCond /home/nebbie/ci2/public%{REQUEST_URI} -f [OR]
    RewriteCond /home/nebbie/ci2/public%{REQUEST_URI} -d
    RewriteRule ^ /home/nebbie/ci2/public%{REQUEST_URI} [L]

    RewriteCond %{ENV:USE_CI2} =1
    RewriteRule ^ /home/nebbie/ci2/public/index.php [L]

    ErrorLog ${APACHE_LOG_DIR}/ci-nebbie-it.error.log
    LogLevel warn
    CustomLog ${APACHE_LOG_DIR}/nebbie-ci-access.log combined

    DirectoryIndex index.php index.html index.htm
</VirtualHost>
