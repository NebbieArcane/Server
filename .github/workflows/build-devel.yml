name: Build devel

on:
  workflow_dispatch:
  push:
    branches:
      - "feature/**"

jobs:
  build:
    if: contains(github.ref, vars.DEVEL_BRANCH ) || github.event_name == 'workflow_dispatch' || true
    runs-on: ubuntu-latest
    environment: devel
    container:
      image: nebbiearcane/mudcompiler:latest
      options: --entrypoint ""
    env:
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
    steps:

      - uses: NebbieArcane/Actions/compile@main
        with:
          build_env: devel
          mysql_host: ${{ vars.MYSQL_HOST }}
          mysql_user: ${{ vars.MYSQL_USER }}
          mysql_db: ${{ vars.MYSQL_DB }}
          mysql_password: ${{ secrets.MYSQL_PASSWORD }}
          mysql_port: ${{ vars.MYSQL_PORT }}
          token: ${{ secrets.GITHUB_TOKEN }}
          excludes: latest,prerelease,release
            
