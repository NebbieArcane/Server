name: compile
description: Compile myst binary and upload workflow artifact
inputs:
  build_env:
    description: Environment name passed to build.sh
    required: true
  mysql_host:
    description: MySQL host for build.sh
    required: false
    default: localhost
  mysql_user:
    description: MySQL user for build.sh
    required: false
    default: root
  mysql_db:
    description: MySQL database name for build.sh
    required: false
    default: nebbie
  artifact_suffix:
    description: Optional suffix for artifact name (e.g. _dev)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Compile myst
      shell: bash
      env:
        MYSQL_HOST: ${{ inputs.mysql_host }}
        MYSQL_USER: ${{ inputs.mysql_user }}
        MYSQL_PASSWORD: ${{ env.MYSQL_PASSWORD }}
        MYSQL_DB: ${{ inputs.mysql_db }}
      run: ./build.sh "${{ inputs.build_env }}"

    - name: Verify myst binary
      shell: bash
      run: test -x mudroot/myst

    - name: Prepare myst release binary
      shell: bash
      env:
        BUILD_ENV: ${{ inputs.build_env }}
        ARTIFACT_SUFFIX: ${{ inputs.artifact_suffix }}
      run: |
        RELEASE_NAME="myst-${BUILD_ENV}${ARTIFACT_SUFFIX}"
        cp mudroot/myst "${RELEASE_NAME}"
        chmod +x "${RELEASE_NAME}"
        ./mudroot/myst -v > myst-version.txt 2>&1 || true
        ./mudroot/myst -c > myst-config.txt 2>&1 || true
        echo "MYST_RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"

    - name: Store myst executable as workflow artifact
      if: github.ref_type != 'tag'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.MYST_RELEASE_NAME }}
        path: |
          ${{ env.MYST_RELEASE_NAME }}
          myst-version.txt
          myst-config.txt
        retention-days: 30
