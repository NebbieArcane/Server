name: Dockerize devel

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build devel"]
    branches: [main]
    types: 
      - completed
  push:
    branches:
      - "feature/odb-discovery"

jobs:
  build:
    runs-on: ubuntu-latest
    environment: devel
    steps:
      - name: Info
        shell: bash
        run: |
          echo "Base ref: ${{ github.ref }}"
      - id: keydb
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
          excludes: latest,prerelease
      - name: Release info
        shell: bash
        run: |
          echo "Release ID: ${{ steps.keydb.outputs.release }}"
          echo "Release URL: ${{ steps.keydb.outputs.id }}"
          echo "Release name: ${{ steps.keydb.outputs.description }}"
