name: compile
description: Compile myst binary and upload workflow artifact
inputs:
  build_env:
    description: Environment name passed to build.sh
    required: true
  mysql_host:
    description: MySQL host for build.sh
    required: false
    default: localhost
  mysql_user:
    description: MySQL user for build.sh
    required: false
    default: nebbie
  mysql_db:
    description: MySQL database name for build.sh
    required: false
    default: nebbie
  mysql_password:
    description: MySQL password for build.sh
    required: false
    default: secret
  mysql_port:
    description: MySQL port for build.sh
    required: false
    default: 3306
  excludes:
    description: Excludes
    required: true
    default: latest,prerelease, release
  dryrun:
    description: Dry run
    required: false
    default: true
  token:
    description: GitHub token
    required: false
    default: "none"
runs:
  using: composite
  steps:
    - name: Compile myst
      if: ${{ inputs.dryrun == false}}
      shell: bash
      env:
        MYSQL_HOST: ${{ inputs.mysql_host }}
        MYSQL_USER: ${{ inputs.mysql_user }}
        MYSQL_PASSWORD: ${{ inputs.MYSQL_PASSWORD }}
        MYSQL_PORT: ${{ inputs.mysql_port }}
        MYSQL_DB: ${{ inputs.mysql_db }}
      run: |
        git config --global --add safe.directory /__w/Server/Server
        ./build.sh "${{ inputs.build_env }}"
        chmod +x "./mudroot/myst"
        mkdir -p ./assets
        cp mudroot/myst "./assets/myst"
        ./mudroot/myst -V > "./assets/version.txt" 2>&1 || true
        ./mudroot/myst -c > "./assets/config.txt" 2>&1 || true

    - name: Fake compile release binary
      shell: bash
      if: ${{ inputs.dryrun == true}}
      env:
        BUILD_ENV: ${{ inputs.build_env }}
      run: |
        RELEASE_NAME="myst-${BUILD_ENV}"
        touch "./mudroot/myst"
        mkdir -p ./assets
        cp mudroot/myst "./assets/myst"
        echo "Version dryrun" > "./assets/version.txt" 2>&1 || true
        echo "Config dryrun" > "./assets/config.txt" 2>&1 || true

    - id: relnotes
      shell: bash
      env:
        BUILD_ENV: ${{ inputs.build_env }}
      run: |
        v=`cat  "./assets/version.txt"`
        c=`cat  "./assets/config.txt"`
        b="Version: $v\nConfig: $c"
        b="${b//'%'/'%25'}"                               # Multiline escape sequences for %
        b="${b//$'\n'/'%0A'}"                             # Multiline escape sequences for '\n'
        b="${b//$'\r'/'%0D'}"                             # Multiline escape sequences for '\r'
        echo "RELEASE_BODY=$b" >> "$GITHUB_ENV"          # <--- Set environment variable
      
    - id: keydb
      uses: pozetroninc/github-action-get-latest-release@master
      with:
        repository: ${{ github.repository }}
        token: ${{ inputs.token }}
        excludes: ${{ inputs.excludes }}    
    - name: Prepare a release
      uses: svenstaro/upload-release-action@v2
      with:
        file_glob: true
        file: ./assets/*
        tag: ${{ github.ref_name }}
        release_id: ${{ steps.keydb.outputs.id }}
        release_name: "${{ github.ref_name }}"
        body: |
          ${{ github.env.RELEASE_BODY }} 
        overwrite: true
        draft: ${{ inputs.build_env == 'devel'}}
        prerelease: ${{ inputs.build_env == 'staging'}}
        make_latest: ${{ inputs.build_env == 'production'}}
