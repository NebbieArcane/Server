name: Dockerize devel

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build devel"]
    branches: [main]
    types: 
      - completed
  push:
    branches:
      - "feature/odb-discovery"

jobs:
  build:
    runs-on: ubuntu-latest
    environment: devel
    steps:
      - name: Info
        shell: bash
        run: |
          echo "Base ref: ${{ github.ref }}"

      - uses: ./.github/actions/dockerize
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          excludes: latest,prerelease
