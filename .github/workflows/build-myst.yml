name: Build myst

on:
  workflow_dispatch:

jobs:
  check-user:
    runs-on: ubuntu-latest
    outputs:
      RUN_AS: ${{ steps.check.outputs.RUN_AS }}
    steps:
      - name: Determine user
        id: check
        shell: bash
        run: |
          USER_ID=$(id -u)
          echo "RUN_AS=$USER_ID" >> "$GITHUB_OUTPUT"

  build:
    needs: check-user
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: nebbiearcane/mudcompiler:latest
      options: --entrypoint "" --user ${{ needs.check-user.outputs.RUN_AS }}
    env:
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set build environment from event
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "BUILD_ENV=release" >> "$GITHUB_ENV"
            echo "SUFFIX=" >> "$GITHUB_ENV"
          elif [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "BUILD_ENV=stage" >> "$GITHUB_ENV"
            echo "SUFFIX=_stag" >> "$GITHUB_ENV"
          elif [[ "${{ github.ref }}" == refs/heads/feature/* ]]; then
            echo "BUILD_ENV=devel" >> "$GITHUB_ENV"
            echo "SUFFIX=_dev" >> "$GITHUB_ENV"
          else
            echo "BUILD_ENV=devel" >> "$GITHUB_ENV"
            echo "SUFFIX=_dev" >> "$GITHUB_ENV"
          fi

      - uses: ./.github/actions/compile
        with:
          build_env: ${{ env.BUILD_ENV }}
          mysql_host: 127.0.0.1
          mysql_user: nebbie${{ env.SUFFIX }}
          mysql_db: nebbie${{ env.SUFFIX }}
          artifact_suffix: ${{ env.SUFFIX }}-${{ github.sha }}
